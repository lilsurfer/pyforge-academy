<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PyForge Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/monokai.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/hint/show-hint.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#1e1e2e;color:#cdd6f4}
/* toolbar */
.bar{display:flex;align-items:center;gap:8px;height:44px;padding:0 14px;background:#181825;border-bottom:1px solid #313244}
.logo{font-weight:700;color:#89b4fa;margin-right:6px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border:none;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.run{background:#a6e3a1;color:#1e1e2e}.run:hover{filter:brightness(1.1)}.run:disabled{opacity:.45;cursor:not-allowed}
.sec{background:#313244;color:#cdd6f4;border:1px solid #45475a}.sec:hover{background:#45475a}
.sep{width:1px;height:22px;background:#313244}
.ml{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;font-size:.72rem;font-weight:500}
.pill.load{background:rgba(249,226,175,.1);color:#f9e2af}
.pill.ok{background:rgba(166,227,161,.1);color:#a6e3a1}
.pill.run{background:rgba(137,180,250,.1);color:#89b4fa}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.anim{animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
/* tabs */
.tabs{display:flex;align-items:center;height:34px;background:#11111b;border-bottom:1px solid #313244;padding:0 10px;gap:4px}
.tab{display:flex;align-items:center;gap:6px;padding:0 14px;height:100%;font-size:.8rem;color:#6c7086;border-bottom:2px solid transparent;cursor:pointer;user-select:none}
.tab.active{color:#cdd6f4;border-bottom-color:#89b4fa}
/* layout */
.workspace{display:flex;height:calc(100vh - 78px)}
.pane{display:flex;flex-direction:column;overflow:hidden}
.left{flex:0 0 55%;border-right:2px solid #313244}
.right{flex:1}
/* sidebar */
.sb{width:180px;flex-shrink:0;background:#181825;border-right:1px solid #313244;display:flex;flex-direction:column;overflow:hidden}
.sb-title{padding:8px 12px;font-size:.65rem;font-weight:700;color:#6c7086;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #313244}
.lessons{overflow-y:auto;flex:1}
.li{display:flex;align-items:center;gap:7px;padding:8px 12px;cursor:pointer;font-size:.78rem;color:#a6adc8;border-left:3px solid transparent;transition:all .12s}
.li:hover{background:rgba(255,255,255,.04);color:#cdd6f4}
.li.on{background:rgba(137,180,250,.08);color:#89b4fa;border-left-color:#89b4fa}
.li .n{font-size:.65rem;color:#6c7086;background:#313244;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:3px;flex-shrink:0}
.li .ck{margin-left:auto;color:#a6e3a1;font-size:.7rem}
.sb-foot{padding:8px 12px;border-top:1px solid #313244;font-size:.68rem;color:#6c7086}
.pb{height:3px;background:#313244;border-radius:2px;margin-top:4px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#89b4fa,#a6e3a1);transition:width .4s}
/* editor */
.ed-wrap{flex:1;overflow:hidden}
.CodeMirror{height:100%!important;font-family:'JetBrains Mono',monospace!important;font-size:13px!important}
/* terminal panel */
.term-head{display:flex;align-items:center;height:30px;padding:0 12px;background:#181825;border-bottom:1px solid #313244;font-size:.72rem;gap:8px}
.term-tabs{display:flex;gap:2px}
.ttab{padding:2px 10px;font-size:.72rem;border-radius:3px;cursor:pointer;color:#6c7086;font-weight:600}
.ttab.on{background:rgba(137,180,250,.12);color:#89b4fa}
.term-body{flex:1;background:#11111b;padding:6px 4px;overflow:hidden}
#terminal{height:100%}
/* xterm overrides */
.xterm{height:100%!important}
.xterm-viewport{background:#11111b!important}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="bar">
  <div class="logo">🐍 PyForge</div>
  <div class="sep"></div>
  <button class="btn run" id="btnRun" disabled onclick="runCode()">▶ Run</button>
  <span style="font-size:.72rem;color:#6c7086;font-family:'JetBrains Mono',monospace">Ctrl+Enter</span>
  <div class="sep"></div>
  <button class="btn sec" onclick="clearTerm()">✕ Clear</button>
  <button class="btn sec" onclick="dlCode()">⬇ Download</button>
  <div class="ml">
    <div class="pill load" id="pill"><div class="dot anim" id="pdot"></div><span id="ptxt">Loading Python…</span></div>
  </div>
</div>

<!-- FILE TABS -->
<div class="tabs">
  <div class="tab active">📄 main.py</div>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- SIDEBAR -->
  <div class="sb">
    <div class="sb-title">Curriculum</div>
    <div class="lessons" id="lessons"></div>
    <div class="sb-foot">
      <span id="prog">0/8 lessons</span>
      <div class="pb"><div class="pf" id="pf" style="width:0"></div></div>
    </div>
  </div>

  <!-- EDITOR PANE -->
  <div class="pane left">
    <div class="ed-wrap">
      <textarea id="editor"></textarea>
    </div>
  </div>

  <!-- TERMINAL PANE -->
  <div class="pane right">
    <div class="term-head">
      <div class="term-tabs">
        <div class="ttab on">TERMINAL</div>
        <div class="ttab" id="probTab">PROBLEMS</div>
      </div>
    </div>
    <div class="term-body">
      <div id="terminal"></div>
    </div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/hint/anyword-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

<script>
// ── LESSONS ───────────────────────────────────────────────────────────────────
const LESSONS = [
  {id:'basics',  icon:'🐍', title:'Python Basics',   code:'name = "Python Learner"\nage = 25\nprint(f"Hello, {name}! Age: {age}")\nprint(type(age))'},
  {id:'strings', icon:'📝', title:'Strings',          code:'s = "The quick brown fox"\nprint(s.upper())\nprint(s[::-1])\nprint(len(s.split()))'},
  {id:'numbers', icon:'🔢', title:'Numbers & Math',   code:'import math\na, b = 17, 5\nprint(f"{a}/{b} = {a/b:.4f}")\nprint(f"sqrt(144) = {math.sqrt(144)}")\nprint(f"pi = {math.pi:.5f}")'},
  {id:'loops',   icon:'🔁', title:'Loops',            code:'for i in range(5, 0, -1):\n    print(f"  {i}...")\nprint("Liftoff! 🚀")\nprint(f"Sum 1-100: {sum(range(101))}")'},
  {id:'cond',    icon:'🌿', title:'Conditionals',     code:'score = 78\nif score >= 90: grade="A 🌟"\nelif score >= 80: grade="B 😊"\nelif score >= 70: grade="C 😐"\nelse: grade="F ❌"\nprint(f"Score {score} → {grade}")'},
  {id:'lists',   icon:'📦', title:'Lists & Dicts',    code:'nums = [64,34,25,12,22,11,90]\nnums.sort()\nprint("Sorted:", nums)\nfreq = {}\nfor w in "python is great python".split():\n    freq[w] = freq.get(w,0)+1\nprint("Freq:", freq)'},
  {id:'funcs',   icon:'🔧', title:'Functions',        code:'def factorial(n):\n    return 1 if n<=1 else n*factorial(n-1)\n\nfor i in range(1,8):\n    print(f"{i}! = {factorial(i)}")'},
  {id:'classes', icon:'🏛️', title:'Classes & OOP',    code:'import math\nclass Circle:\n    def __init__(self,r): self.r=r\n    def area(self): return math.pi*self.r**2\n    def __repr__(self): return f"Circle(r={self.r}, area={self.area():.2f})"\n\nprint(Circle(5))\nprint(Circle(10))'},
];

let current = 0;
let done = new Set();

// ── CODEMIRROR ────────────────────────────────────────────────────────────────
const KW = ['False','None','True','and','as','assert','async','await','break','class','continue','def','del','elif','else','except','finally','for','from','global','if','import','in','is','lambda','nonlocal','not','or','pass','raise','return','try','while','with','yield'];
const BI = ['abs','all','any','bin','bool','chr','dict','dir','enumerate','eval','exec','filter','float','format','frozenset','getattr','hasattr','hash','help','hex','id','input','int','isinstance','iter','len','list','locals','map','max','min','next','object','oct','ord','pow','print','property','range','repr','reversed','round','set','setattr','slice','sorted','staticmethod','str','sum','super','tuple','type','vars','zip'];

function pyHint(cm) {
  const cur = cm.getCursor(), tok = cm.getTokenAt(cur);
  const word = tok.string.trim();
  if (!word) return;
  const extra = cm.getValue().match(/[a-zA-Z_]\w*/g) || [];
  const all = [...new Set([...KW,...BI,...extra])];
  return {list: all.filter(w=>w.startsWith(word)&&w!==word), from: CodeMirror.Pos(cur.line,tok.start), to: CodeMirror.Pos(cur.line,tok.end)};
}

const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
  mode:'python', theme:'monokai', lineNumbers:true,
  indentUnit:4, tabSize:4, indentWithTabs:false,
  matchBrackets:true, autoCloseBrackets:true,
  extraKeys:{
    'Tab': c => { if(c.somethingSelected()){c.indentSelection('add')} else { const t=c.getTokenAt(c.getCursor()); if(t.string.trim()) CodeMirror.showHint(c,pyHint,{completeSingle:false}); else c.replaceSelection('    '); }},
    'Ctrl-Enter': ()=>runCode(),
  }
});
cm.on('inputRead',(c,e)=>{ if(e.text[0]&&/[a-zA-Z_]/.test(e.text[0])) CodeMirror.showHint(c,pyHint,{completeSingle:false}); });

// ── XTERM ─────────────────────────────────────────────────────────────────────
const term = new Terminal({
  theme:{background:'#11111b',foreground:'#cdd6f4',cursor:'#89b4fa',selectionBackground:'rgba(137,180,250,.3)'},
  fontFamily:"'JetBrains Mono',monospace", fontSize:13, lineHeight:1.4,
  cursorBlink:true, scrollback:2000,
});
const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));
fitAddon.fit();
window.addEventListener('resize', ()=>fitAddon.fit());

// ── SHARED BUFFER (stdin bridge) ──────────────────────────────────────────────
// Layout: [0]=status(0=idle,1=waiting,2=ready), [1]=textLen, [8+]=text bytes
const sharedBuf = new SharedArrayBuffer(8200);
const statusArr = new Int32Array(sharedBuf, 0, 2);
const textArr   = new Uint8Array(sharedBuf, 8);

// ── WORKER ────────────────────────────────────────────────────────────────────
const worker = new Worker('./pyworker.js');
worker.postMessage({type:'init', data:{sharedBuf}});

worker.onmessage = function(e) {
  const {type, text} = e.data;
  if (type === 'ready') {
    setStatus('ok');
    document.getElementById('btnRun').disabled = false;
    term.writeln('\x1b[32m✓ Python ready. Press Run or Ctrl+Enter.\x1b[0m');
  }
  if (type === 'stdout') term.write(text.replace(/\n/g,'\r\n'));
  if (type === 'stderr') term.write('\x1b[31m' + text.replace(/\n/g,'\r\n') + '\x1b[0m');
  if (type === 'done') {
    accepting = false;
    term.writeln('\x1b[90m\r\n** Process exited - Return Code: 0 **\x1b[0m');
    setStatus('ok');
    document.getElementById('btnRun').disabled = false;
    done.add(current);
    document.getElementById('ck_'+current).style.display='';
    updateProg();
  }
};

// ── TERMINAL INPUT ────────────────────────────────────────────────────────────
let inputBuf = '';
let accepting = false;

// Poll for when Pyodide is waiting for stdin
let pollTimer = null;
function startPoll() {
  pollTimer = setInterval(()=>{
    if (Atomics.load(statusArr,0) === 1 && !accepting) {
      accepting = true;
      term.write('\x1b[33m\x1b[0m'); // show cursor ready
    }
  }, 30);
}
function stopPoll() {
  clearInterval(pollTimer);
  accepting = false;
}

term.onKey(({key, domEvent}) => {
  if (!accepting) return;
  const code = domEvent.keyCode;
  if (code === 13) { // Enter
    term.write('\r\n');
    const encoded = new TextEncoder().encode(inputBuf + '\n');
    textArr.set(encoded);
    Atomics.store(statusArr, 1, encoded.length);
    Atomics.store(statusArr, 0, 2);
    Atomics.notify(statusArr, 0, 1);
    inputBuf = '';
    accepting = false;
  } else if (code === 8) { // Backspace
    if (inputBuf.length > 0) {
      inputBuf = inputBuf.slice(0,-1);
      term.write('\b \b');
    }
  } else if (key && !domEvent.ctrlKey && !domEvent.metaKey) {
    inputBuf += key;
    term.write(key);
  }
});

// ── RUN ───────────────────────────────────────────────────────────────────────
function runCode() {
  const code = cm.getValue();
  term.clear();
  inputBuf = '';
  Atomics.store(statusArr, 0, 0);
  setStatus('run');
  document.getElementById('btnRun').disabled = true;
  startPoll();
  worker.postMessage({type:'run', data:{code}});
}

function clearTerm() { term.clear(); }

function dlCode() {
  const a = Object.assign(document.createElement('a'),{
    href: URL.createObjectURL(new Blob([cm.getValue()],{type:'text/plain'})),
    download: 'pyforge_code.py'
  });
  a.click();
}

// ── STATUS ────────────────────────────────────────────────────────────────────
function setStatus(s) {
  const pill=document.getElementById('pill'), dot=document.getElementById('pdot'), txt=document.getElementById('ptxt');
  pill.className='pill '+s;
  dot.className='dot'+(s!=='ok'?' anim':'');
  txt.textContent={load:'Loading Python…',ok:'Python Ready',run:'Running…'}[s]||s;
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  document.getElementById('lessons').innerHTML = LESSONS.map((l,i)=>`
    <div class="li${i===0?' on':''}" id="li_${i}" onclick="pick(${i})">
      <span class="n">${i+1}</span>${l.icon} ${l.title}
      <span class="ck" id="ck_${i}" style="display:none">✓</span>
    </div>`).join('');
}
function pick(i) {
  document.querySelectorAll('.li').forEach(e=>e.classList.remove('on'));
  document.getElementById('li_'+i).classList.add('on');
  current = i;
  cm.setValue(LESSONS[i].code);
}
function updateProg() {
  const n=done.size,t=LESSONS.length;
  document.getElementById('prog').textContent=`${n}/${t} lessons`;
  document.getElementById('pf').style.width=`${Math.round(n/t*100)}%`;
}

buildSidebar();
cm.setValue(LESSONS[0].code);
</script>
</body>
</html>
