<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>PyForge Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.css" />
    <style>
      body { background-color: #0d1117; margin: 0; padding: 0; }
      #root { height: 100vh; width: 100vw; }
      /* Custom loading text */
      .st-emotion-cache-1vt4y7f { color: #58a6ff !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: [], // Removed streamlit-ace for maximum speed and reliability
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st
import sys, io, time, traceback
from dataclasses import dataclass

# ── Safe Executor (Wasm Compatible) ────────────────
@dataclass
class ExecutionResult:
    output: str
    error: str
    exec_time: float

def run_code(code):
    start = time.perf_counter()
    out, err = io.StringIO(), io.StringIO()
    old_out = sys.stdout
    sys.stdout = out
    try:
        exec(code, {"__name__": "__main__"})
    except Exception:
        err.write(traceback.format_exc())
    finally:
        sys.stdout = old_out
    return ExecutionResult(out.getvalue(), err.getvalue(), time.perf_counter() - start)

# ── App Logic ──────────────────────────────────────
st.set_page_config(page_title="PyForge Academy", page_icon="🐍", layout="wide")

# Embedded CSS
st.markdown("""<style>
    :root { --bg: #0d1117; --blue: #58a6ff; --text: #e6edf3; }
    .main { background-color: var(--bg); color: var(--text); }
    .stButton>button { background: var(--blue) !important; color: white !important; border: none; width: 100%; border-radius: 8px; }
    .theory-box { background: #161b22; padding: 1.5rem; border-radius: 12px; border: 1px solid #30363d; line-height: 1.6; }
    .output-panel { background: #000; padding: 1rem; border-radius: 8px; border: 1px solid #333; font-family: monospace; }
</style>""", unsafe_allow_html=True)

st.title("🐍 PyForge Academy")
st.markdown("---")

tab1, tab2 = st.tabs(["📚 Lessons", "🧪 Sandbox"])

with tab1:
    col1, col2 = st.columns([1, 1])
    with col1:
        st.markdown('<div class="theory-box"><h3>Lesson 1: Python Basics</h3><p>Variables are containers for storing data values. Use <code>print()</code> to show output.</p></div>', unsafe_allow_html=True)
    with col2:
        code = st.text_area("Write Python Code", value="name = 'PyForge'\\nprint(f'Hello from {name}!')", height=200)
        if st.button("▶ Run Code"):
            res = run_code(code)
            st.markdown(f'<div class="output-panel"><b style="color:#3fb950">Output:</b><br>{res.output}</div>', unsafe_allow_html=True)
            if res.error: st.error(res.error)

with tab2:
    st.subheader("🧪 Sandbox Mode")
    sb_code = st.text_area("Experiment freely:", value="print('Testing Sandbox...')", height=300)
    if st.button("▶ Run Sandbox"):
        res = run_code(sb_code)
        st.markdown(f'<div class="output-panel"><b>Result:</b><br>{res.output}</div>', unsafe_allow_html=True)
`,
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
