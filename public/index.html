<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>PyForge Academy | Python Learning</title>
    <meta name="description" content="Learn Python interactively with PyForge Academy. 8 lessons, live code execution, and autocomplete." />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.css" />
    <style>
      body  { background: #0d1117; margin: 0; padding: 0; }
      #root { height: 100vh; width: 100vw; }

      /* Loading overlay */
      #loading {
        position: fixed; inset: 0;
        background: #0d1117;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; transition: opacity .5s;
      }
      #loading h1 { color: #58a6ff; font-family: sans-serif; font-size: 1.8rem; margin: 0 0 .5rem; }
      #loading p  { color: #8b949e; font-family: sans-serif; font-size: .9rem; margin: 0 0 2rem; }
      .spinner {
        width: 40px; height: 40px; border: 3px solid #30363d;
        border-top-color: #58a6ff; border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Loading screen shown while stlite boots -->
    <div id="loading">
      <h1>🐍 PyForge Academy</h1>
      <p>Booting Python engine — this takes ~10s on first load…</p>
      <div class="spinner"></div>
    </div>

    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js"></script>
    <script>
      // Hide the loading overlay once Streamlit is ready
      window.addEventListener("stlite:ready", function () {
        var el = document.getElementById("loading");
        if (el) { el.style.opacity = "0"; setTimeout(function(){ el.remove(); }, 600); }
      });

      stlite.mount({
        // streamlit-ace provides the Pro Editor with Tab-autocomplete
        requirements: ["streamlit-ace"],
        entrypoint: "app.py",
        // Load Python source files from the same Cloudflare Pages origin
        // This avoids ALL JS-escaping bugs from embedded strings
        files: {
          "app.py":        { url: "./app.py"        },
          "executor.py":   { url: "./executor.py"   },
          "curriculum.py": { url: "./curriculum.py" },
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
