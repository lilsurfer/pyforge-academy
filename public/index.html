<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>PyForge Academy | Pro Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.css" />
    <style>
      body { background-color: #0d1117; margin: 0; padding: 0; }
      #root { height: 100vh; width: 100vw; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["streamlit-ace"], // Re-enabling Ace with specific optimization
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st
import sys, io, time, traceback
from dataclasses import dataclass
from curriculum import LESSONS
from streamlit_ace import st_ace

@dataclass
class ExecutionResult:
    output: str
    error: str
    exec_time: float

def run_code(code):
    start = time.perf_counter()
    out, err = io.StringIO(), io.StringIO()
    old_out = sys.stdout
    sys.stdout = out
    try:
        exec(code, {"__name__": "__main__"})
    except Exception:
        err.write(traceback.format_exc())
    finally:
        sys.stdout = out if out.getvalue() else old_out
    return ExecutionResult(out.getvalue(), err.getvalue(), time.perf_counter() - start)

st.set_page_config(page_title="PyForge Academy", layout="wide")

# Theme styling
st.markdown("""<style>
    .main { background-color: #0d1117; color: #e6edf3; }
    .stButton>button { background: #58a6ff !important; color: white !important; }
    .theory-box { background: #161b22; padding: 1.5rem; border-radius: 12px; border: 1px solid #30363d; line-height: 1.6; }
    .output-panel { background: #000; padding: 1rem; border-radius: 8px; border: 1px solid #333; margin-top: 1rem; }
</style>""", unsafe_allow_html=True)

if "lsn_idx" not in st.session_state: st.session_state.lsn_idx = 0
if "done" not in st.session_state: st.session_state.done = set()

# Sidebar
with st.sidebar:
    st.title("🐍 PyForge")
    st.markdown("---")
    for i, l in enumerate(LESSONS):
        icon = "✅ " if i in st.session_state.done else l["icon"] + " "
        if st.button(f"{icon}{l['title']}", key=f"nav_{i}", use_container_width=True, type="primary" if st.session_state.lsn_idx == i else "secondary"):
            st.session_state.lsn_idx = i
            st.rerun()

# Tabs
tab1, tab2 = st.tabs(["📚 Lessons", "🧪 Sandbox"])

with tab1:
    lsn = LESSONS[st.session_state.lsn_idx]
    st.header(f"{lsn['icon']} {lsn['title']}")
    c1, c2 = st.columns([1, 1])
    with c1:
        st.markdown(f'<div class="theory-box">{lsn["theory"]}</div>', unsafe_allow_html=True)
    with c2:
        st.markdown("##### ⌨️ Pro Editor (Tab to Complete)")
        # THE MAGIC HAPPENS HERE: st_ace with auto_complete=True
        code = st_ace(
            value=lsn["starter_code"],
            language="python",
            theme="monokai",
            key=f"ace_{lsn['id']}",
            height=400,
            auto_complete=True,
            font_size=14,
            tab_size=4
        )
        if st.button("▶ Run Code", key=f"run_{lsn['id']}", use_container_width=True):
            res = run_code(code)
            st.markdown(f'<div class="output-panel"><pre style="color:#3fb950">Output:</pre><pre style="color:white">{res.output}</pre></div>', unsafe_allow_html=True)
            if res.error: st.error(res.error)
            if not res.error: st.session_state.done.add(st.session_state.lsn_idx)

with tab2:
    st.markdown("### 🧪 Pro Sandbox")
    sb_code = st_ace(
        value="# Experiment freely!\\n# Try typing 'import' or 'print' and hitting Tab",
        language="python",
        theme="monokai",
        key="ace_sandbox",
        height=500,
        auto_complete=True
    )
    if st.button("▶ Run Sandbox", use_container_width=True):
        res = run_code(sb_code)
        st.markdown(f'<div class="output-panel"><pre style="color:white">{res.output}</pre></div>', unsafe_allow_html=True)
`,
          "curriculum.py": `
LESSONS = [
    {"id": "basics", "icon": "🐍", "title": "Python Basics", "objective": "Variables and print()", "theory": "Python is easy!\\n\\nType \`pri\` and hit Tab in the editor.", "starter_code": "name = 'PyForge'\\nprint(name)"},
    {"id": "loops", "icon": "🔁", "title": "Loops", "objective": "Repeat actions", "theory": "Use for loops.\\n\\nTry typing \`for\` and Tab.", "starter_code": "for i in range(5):\\n    print(i)"}
]
`
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
